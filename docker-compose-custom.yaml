x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - nanobot_home:/home/nanobot/.nanobot
  cap_drop:
    - ALL
  cap_add:
    - SYS_ADMIN
  security_opt:
    - apparmor=unconfined
    - seccomp=unconfined

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - "18790:18790"

  nanobot-cli:
    <<: *common-config
    command: ["status"]
    stdin_open: true
    tty: true
    profiles:
      - cli

volumes:
  nanobot_home:
